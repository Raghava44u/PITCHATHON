  <text x="350" y="2045" fill="#546E7A" font-size="11">💾 Storage: Supabase Storage (free tier)</text>
  <text x="350" y="2062" fill="#546E7A" font-size="11">🤖 AI tips: Anthropic API / Gemini free tier</text>
