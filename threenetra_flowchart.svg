  <text x="210" y="474" text-anchor="middle" fill="white" font-size="13" font-weight="bold">👩 Women Safety Mode</text>
  <text x="210" y="492" text-anchor="middle" fill="#F8BBD9" font-size="11">Self-driven · Activate with 1 tap</text>

  <!-- Women → Monitoring -->
  <line x1="210" y1="505" x2="210" y2="530" stroke="#E91E63" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="60" y="530" width="300" height="75" rx="10" fill="#880E4F" filter="url(#shadow)"/>
  <text x="210" y="553" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📡 Continuous Monitoring</text>
  <text x="210" y="571" text-anchor="middle" fill="#F8BBD9" font-size="10">GPS tracking · Motion sensors</text>
  <text x="210" y="587" text-anchor="middle" fill="#F8BBD9" font-size="10">Background service always-on</text>

  <!-- Women → Risk Engine -->
  <line x1="210" y1="605" x2="210" y2="628" stroke="#E91E63" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- ══ CHILD MODE COLUMN (right) ══ -->
  <rect x="540" y="450" width="300" height="55" rx="10" fill="url(#childGrad)" filter="url(#shadow)"/>
  <text x="690" y="474" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🧒 Child Safety Mode</text>
  <text x="690" y="492" text-anchor="middle" fill="#BBDEFB" font-size="11">Parent-controlled · Geo-fencing</text>

  <line x1="690" y1="505" x2="690" y2="530" stroke="#1976D2" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="540" y="530" width="300" height="75" rx="10" fill="#0D47A1" filter="url(#shadow)"/>
  <text x="690" y="553" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📡 Live Location + Geo-fence</text>
  <text x="690" y="571" text-anchor="middle" fill="#BBDEFB" font-size="10">Safe zones · Inactivity detection</text>
  <text x="690" y="587" text-anchor="middle" fill="#BBDEFB" font-size="10">Unusual movement alerts</text>

  <line x1="690" y1="605" x2="690" y2="628" stroke="#1976D2" stroke-width="2" marker-end="url(#arrow)"/>

