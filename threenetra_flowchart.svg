  <rect x="455" y="1362" width="270" height="50" rx="8" fill="#00695C"/>
  <text x="590" y="1382" text-anchor="middle" fill="white" font-size="11" font-weight="bold">🗺️ Crowd Heatmap (OSM)</text>
  <text x="590" y="1400" text-anchor="middle" fill="#B2DFDB" font-size="10">Anonymous safety ratings by community</text>

  <rect x="165" y="1422" width="270" height="50" rx="8" fill="#00695C"/>
  <text x="300" y="1442" text-anchor="middle" fill="white" font-size="11" font-weight="bold">🤖 AI Safety Tip Engine</text>
  <text x="300" y="1460" text-anchor="middle" fill="#B2DFDB" font-size="10">Context-aware tips via Claude API (free)</text>

  <rect x="455" y="1422" width="270" height="50" rx="8" fill="#00695C"/>
  <text x="590" y="1442" text-anchor="middle" fill="white" font-size="11" font-weight="bold">📵 Offline SOS Mode</text>
  <text x="590" y="1460" text-anchor="middle" fill="#B2DFDB" font-size="10">SMS alerts work without internet</text>

  <rect x="165" y="1482" width="560" height="35" rx="8" fill="#00695C"/>
  <text x="450" y="1502" text-anchor="middle" fill="white" font-size="11" font-weight="bold">🧠 TFLite-Ready Risk Engine slot · Fake call screen · Trusted contact widget</text>

  <line x1="450" y1="1525" x2="450" y2="1555" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

