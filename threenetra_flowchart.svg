  <!-- Connect both to risk engine -->
  <line x1="210" y1="628" x2="360" y2="658" stroke="#E91E63" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="690" y1="628" x2="540" y2="658" stroke="#1976D2" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="270" y="655" width="360" height="90" rx="12" fill="url(#riskGrad)" filter="url(#shadow)"/>
