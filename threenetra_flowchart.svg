  <text x="450" y="151" text-anchor="middle" fill="white" font-size="14" font-weight="bold">📱 App Launch</text>

  <!-- Arrow down -->
  <line x1="450" y1="170" x2="450" y2="195" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ONBOARDING / AUTH -->
  <rect x="300" y="195" width="300" height="55" rx="10" fill="#283593" filter="url(#shadow)"/>
  <text x="450" y="219" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🔐 Onboarding / Auth</text>
  <text x="450" y="238" text-anchor="middle" fill="#B3C8F8" font-size="11">Supabase Auth · Anonymous fallback</text>

  <line x1="450" y1="250" x2="450" y2="275" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

