  <text x="285" y="1226" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Supabase Auth</text>
  <text x="285" y="1242" text-anchor="middle" fill="#90CAF9" font-size="10">Users · Sessions</text>

