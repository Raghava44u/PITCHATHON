  <text x="450" y="1137" text-anchor="middle" fill="#CE93D8" font-size="11">Save locally · Upload to Supabase Storage</text>

  <line x1="450" y1="1150" x2="450" y2="1175" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

