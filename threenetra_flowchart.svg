  <polygon points="450,775 560,820 450,865 340,820" fill="#BF360C" filter="url(#shadow)"/>
  <text x="450" y="814" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Risk Level?</text>
  <text x="450" y="830" text-anchor="middle" fill="#FFCCBC" font-size="11">Evaluate threshold</text>

