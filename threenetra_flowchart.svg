  <text x="450" y="299" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🛡️ Permission Manager</text>
  <text x="450" y="317" text-anchor="middle" fill="#CFD8DC" font-size="11">Location · Mic · SMS · Contacts</text>

  <line x1="450" y1="330" x2="450" y2="355" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MODE SELECTION -->
  <rect x="290" y="355" width="320" height="55" rx="10" fill="#4527A0" filter="url(#shadow)"/>
  <text x="450" y="379" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🧭 Mode Selection Screen</text>
  <text x="450" y="397" text-anchor="middle" fill="#CE93D8" font-size="11">Women Safety Mode · Child Safety Mode</text>

  <!-- Branch arrows -->
