  <text x="450" y="1668" text-anchor="middle" fill="white" font-size="13" font-weight="bold">👨‍👩‍👧 Parent Dashboard (Child Mode)</text>
  <text x="450" y="1686" text-anchor="middle" fill="#B2EBF2" font-size="11">Live map (OSM) · Geo-fence manager</text>
  <text x="450" y="1703" text-anchor="middle" fill="#B2EBF2" font-size="11">Alert history · Child activity feed</text>

  <line x1="450" y1="1715" x2="450" y2="1745" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

