  <text x="450" y="1596" text-anchor="middle" fill="#BBDEFB" font-size="11">FCM (primary) · Local notifications fallback · SMS</text>

  <line x1="450" y1="1615" x2="450" y2="1645" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrow)"/>

