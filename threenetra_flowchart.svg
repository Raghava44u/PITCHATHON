  <circle cx="85" cy="2015" r="7" fill="#E91E63"/> <text x="100" y="2019" fill="#37474F" font-size="11">Women Mode</text>
  <circle cx="200" cy="2015" r="7" fill="#1976D2"/> <text x="215" y="2019" fill="#37474F" font-size="11">Child Mode</text>
  <circle cx="310" cy="2015" r="7" fill="#F57C00"/> <text x="325" y="2019" fill="#37474F" font-size="11">Risk Engine</text>
  <circle cx="420" cy="2015" r="7" fill="#B71C1C"/> <text x="435" y="2019" fill="#37474F" font-size="11">Emergency</text>
  <circle cx="530" cy="2015" r="7" fill="#004D40"/> <text x="545" y="2019" fill="#37474F" font-size="11">Hackathon Features</text>
  <text x="75" y="2045" fill="#546E7A" font-size="11">📦 Auth: Supabase free tier</text>
  <text x="75" y="2062" fill="#546E7A" font-size="11">🗺️ Maps: OpenStreetMap (100% free)</text>
