  <text x="450" y="698" text-anchor="middle" fill="#FFE0B2" font-size="11">INPUT: GPS · Time · Motion · Geo-fence</text>
  <text x="450" y="714" text-anchor="middle" fill="#FFE0B2" font-size="11">LOGIC: night+speed → HIGH · isolated → MED</text>
  <text x="450" y="730" text-anchor="middle" fill="#FFE0B2" font-size="11">OUTPUT: LOW / MEDIUM / HIGH + Reason</text>

