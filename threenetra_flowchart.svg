  <text x="450" y="1897" text-anchor="middle" fill="#A5D6A7" font-size="11">Android APK · Supabase free tier · OSM</text>

  <!-- FEEDBACK LOOP -->
  <path d="M 300 1882 Q 100 1882 100 820 Q 100 628 270 700" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
  <text x="80" y="1260" text-anchor="middle" fill="#4A90D9" font-size="10" transform="rotate(-90 80 1260)">Continuous feedback loop</text>

  <!-- Legend -->
