  <text x="450" y="1022" text-anchor="middle" fill="#FFCDD2" font-size="11">② Start audio recording (background)</text>
  <text x="450" y="1039" text-anchor="middle" fill="#FFCDD2" font-size="11">③ FCM push to trusted contacts</text>
  <text x="450" y="1056" text-anchor="middle" fill="#FFCDD2" font-size="11">④ Optional: call intent trigger</text>

