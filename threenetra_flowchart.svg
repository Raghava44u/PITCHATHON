  <text x="450" y="913" text-anchor="middle" fill="white" font-size="12" font-weight="bold">⚠️ Alert User / Parent</text>
  <text x="450" y="930" text-anchor="middle" fill="#FFF9C4" font-size="10">FCM push · In-app warning · Vibrate</text>

