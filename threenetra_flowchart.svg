  <rect x="270" y="1745" width="360" height="80" rx="10" fill="#37474F" filter="url(#shadow)"/>
  <text x="450" y="1768" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🧪 Testing &amp; QA</text>
  <text x="450" y="1786" text-anchor="middle" fill="#CFD8DC" font-size="11">Trigger HIGH risk manually</text>
  <text x="450" y="1802" text-anchor="middle" fill="#CFD8DC" font-size="11">Audio record verify · Geo-fence breach test</text>
  <text x="450" y="1818" text-anchor="middle" fill="#CFD8DC" font-size="11">Real APK → Android device deploy</text>

  <line x1="450" y1="1825" x2="450" y2="1855" stroke="#43A047" stroke-width="2" marker-end="url(#arrow-green)"/>

